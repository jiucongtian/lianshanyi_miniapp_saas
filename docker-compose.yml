version: '3.9'

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: lsy-api
    restart: unless-stopped
    ports:
      - '127.0.0.1:3001:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/lianshanyi_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_in_prod
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_prod
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: lianshanyi
      SMS_PROVIDER: mock
      AI_PROVIDER: coze
      COZE_API_TOKEN: sat_JBr8tgHf8a8IkpwoFMpNWiioLFdqdAWj9O8HVRZ7DFmYqQf2wKzf92vRqKjQQMdv
      COZE_CARD_DRAW_WORKFLOW_ID: ${COZE_CARD_DRAW_WORKFLOW_ID:-7565131575660003366}
      COZE_DAILY_INSIGHT_WORKFLOW_ID: ${COZE_DAILY_INSIGHT_WORKFLOW_ID:-7583167143870382106}
      COZE_ASSISTANT_BOT_ID: ${COZE_ASSISTANT_BOT_ID:-7615870340559978548}
      SINGLE_DAILY_INSIGHT_JOB: 'true'
      OPENAPI_SECRET_ENC_KEY: bdc09011cd6f4a1fbe0e1c9c4fd85343ea6f835022765adef2cebf2b7bb0b2fa
    volumes:
      - ./apps/api/src:/app/src
      - /app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lsy-net

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: lsy-web
    restart: unless-stopped
    ports:
      - '127.0.0.1:5173:5173'
    environment:
      VITE_API_BASE_URL: /api/v1
      API_PROXY_TARGET: http://api:3000
    volumes:
      - ./apps/web/src:/app/src
      - /app/node_modules
    networks:
      - lsy-net

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      target: development
    container_name: lsy-admin
    restart: unless-stopped
    ports:
      - '127.0.0.1:5174:5174'
    environment:
      API_PROXY_TARGET: http://api:3000
    volumes:
      - ./apps/admin/src:/app/src
      - ./apps/admin/vite.config.ts:/app/vite.config.ts
      - ./apps/admin/index.html:/app/index.html
      - /app/node_modules
    networks:
      - lsy-net

  mongo:
    image: mongo:7
    container_name: lsy-mongo
    restart: unless-stopped
    ports:
      - '127.0.0.1:27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lsy-net

  redis:
    image: redis:7-alpine
    container_name: lsy-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lsy-net

  minio:
    image: minio/minio:latest
    container_name: lsy-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - lsy-net

volumes:
  mongo_data:
  redis_data:
  minio_data:

networks:
  lsy-net:
    driver: bridge
