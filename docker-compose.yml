version: '3.9'

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: lsy-api
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/lianshanyi_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_in_prod
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_prod
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: lianshanyi
      SMS_PROVIDER: mock
      AI_PROVIDER: mock
      SINGLE_DAILY_INSIGHT_JOB: 'true'
    volumes:
      - ./apps/api/src:/app/src
      - /app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lsy-net

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: lsy-web
    restart: unless-stopped
    ports:
      - '127.0.0.1:5173:5173'
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1
    volumes:
      - ./apps/web/src:/app/src
      - /app/node_modules
    networks:
      - lsy-net

  mongo:
    image: mongo:7
    container_name: lsy-mongo
    restart: unless-stopped
    ports:
      - '127.0.0.1:27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lsy-net

  redis:
    image: redis:7-alpine
    container_name: lsy-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lsy-net

  minio:
    image: minio/minio:latest
    container_name: lsy-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - lsy-net

volumes:
  mongo_data:
  redis_data:
  minio_data:

networks:
  lsy-net:
    driver: bridge
