version: '3.9'

# Production compose — API + MongoDB + Redis + MinIO (Nginx runs on host)
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    image: lianshanyi-api:latest
    container_name: lsy-api
    restart: always
    ports:
      - '127.0.0.1:3000:3000'
    env_file:
      - ./apps/api/.env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lsy-net
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'

  mongo:
    image: mongo:7
    container_name: lsy-mongo
    restart: always
    ports:
      - '127.0.0.1:27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lsy-net

  redis:
    image: redis:7-alpine
    container_name: lsy-redis
    restart: always
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lsy-net

  minio:
    image: minio/minio:latest
    container_name: lsy-minio
    restart: always
    command: server /data --console-address ':9001'
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    env_file:
      - ./apps/api/.env
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - lsy-net

volumes:
  mongo_data:
  redis_data:
  minio_data:

networks:
  lsy-net:
    driver: bridge
